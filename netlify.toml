[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Security headers for every response. CSP notes:
# - script-src needs 'unsafe-inline' for Next's inline bootstrap scripts
#   (no nonce support on fully static output).
# - style-src needs 'unsafe-inline' for framer-motion's inline styles.
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests"

# Immutable cache for versioned-by-filename static assets.
[[headers]]
  for = "/avatar/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Hero media: 30 days rather than immutable — these filenames are not
# content-hashed, so a year-long immutable cache would strand viewers on a
# stale clip if the hero is ever re-cut.
[[headers]]
  for = "/hero/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
